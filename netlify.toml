[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

# Scheduled function: Check for activities opening for registration
# Runs daily at 8:00 AM Israel time (6:00 AM UTC during winter, 5:00 AM UTC during summer)
# Using 6:00 AM UTC as a reasonable middle ground
[functions."check-activity-registration"]
  schedule = "0 6 * * *"

# Dynamic sitemap from Netlify function
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Redirect root to homepage — splash page is not the canonical homepage
[[redirects]]
  from = "/"
  to = "/home"
  status = 301
  force = true

# SPA fallback - must come AFTER domain redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-Z6wG901mJehG8RneT0u7V2mnlgo7eOnqI9czXZ/XhYU=' https://connect.facebook.net https://cdn.enable.co.il; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://images.prismic.io https://www.facebook.com; font-src 'self'; connect-src 'self' https://*.prismic.io https://www.facebook.com; frame-src 'self' https://www.youtube.com https://youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"